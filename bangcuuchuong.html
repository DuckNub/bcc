<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Bảng Cửu Chương</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .checkbox-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 8px; background: #e0e0e0; font-weight: bold; transition: 0.3s; }
        button.selected { background: #28a745; color: white; }
        input { width: 100%; padding: 12px; font-size: 18px; text-align: center; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .numpad button { background: #007bff; color: white; font-size: 20px; }
        #question { font-size: 32px; font-weight: bold; margin: 15px 0; color: #333; }
        .hidden { display: none; }
        .scoreboard { display: flex; justify-content: space-around; font-size: 16px; margin-bottom: 5px; font-weight: bold; }
        .timer-box { font-size: 22px; font-weight: bold; color: #d9534f; margin-bottom: 10px; }
        .history-list { text-align: left; margin-top: 15px; font-size: 14px; }
        .history-item { padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>CHÚC BEN HỌC VUI!!</h1>
        <div class="checkbox-group" id="table-selection">
            <script>for(let i=1; i<=10; i++) document.write(`<button onclick="this.classList.toggle('selected')" id="btn-${i}">${i}</button>`);</script>
        </div>
        <input type="number" id="total-questions" placeholder="Số câu (ví dụ: 10)">
        <input type="number" id="time-limit" placeholder="Giây mỗi câu">
        <button onclick="startGame()" style="width: 100%; background: #28a745; color: white;">BẮT ĐẦU</button>
        <div class="history-list" id="history-display"></div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="timer-box">Thời gian: <span id="timer">0</span>s</div>
        <div class="scoreboard">
            <span>Câu: <span id="current-q">1</span>/<span id="max-q">0</span></span>
            <span style="color: #28a745;">Đúng: <span id="score-right">0</span></span>
            <span style="color: #dc3545;">Sai: <span id="score-wrong">0</span></span>
        </div>
        <div id="question"></div>
        <input type="number" id="answer" readonly>
        <div class="numpad">
            <script>for(let i=1; i<=9; i++) document.write(`<button onclick="addDigit(${i})">${i}</button>`);</script>
            <button onclick="clearInput()" style="background: #dc3545;">C</button>
            <button onclick="addDigit(0)">0</button>
            <button onclick="checkAnswer()" style="background: #28a745;">OK</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>Tổng kết</h1>
        <h2 id="final-score"></h2>
        <button onclick="location.reload()" style="background: #007bff; color: white; width: 100%;">QUAY LẠI TRANG CHỦ</button>
    </div>
</div>

<script>
    let selectedTables = [], maxQ, timeLimit, currentQ = 1, scoreRight = 0, scoreWrong = 0, currentCorrect, timerInterval, timeLeft;

    // Hiển thị lịch sử khi mở web
    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('mathHistory') || '[]');
        let html = '<h3>Lịch sử gần đây:</h3>';
        history.slice(-5).reverse().forEach(item => {
            html += `<div class="history-item">${item.date} - <b>${item.score} điểm</b></div>`;
        });
        document.getElementById('history-display').innerHTML = html;
    }
    loadHistory();

    function startGame() {
        selectedTables = Array.from(document.querySelectorAll('.selected')).map(el => parseInt(el.innerText));
        maxQ = parseInt(document.getElementById('total-questions').value);
        timeLimit = parseInt(document.getElementById('time-limit').value);
        if (selectedTables.length === 0 || !maxQ || !timeLimit) return alert("Vui lòng điền đủ thông tin!");
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('max-q').innerText = maxQ;
        nextQuestion();
    }

    function startTimer() {
        timeLeft = timeLimit;
        document.getElementById('timer').innerText = timeLeft;
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) { clearInterval(timerInterval); checkAnswer(true); }
        }, 1000);
    }

    function nextQuestion() {
        if (currentQ > maxQ) {
            let finalPoints = (scoreRight / maxQ * 10).toFixed(1);
            saveResult(finalPoints);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `Bạn đạt: ${finalPoints} điểm`;
            return;
        }
        let t = selectedTables[Math.floor(Math.random() * selectedTables.length)];
        let m = Math.floor(Math.random() * 10) + 1;
        currentCorrect = t * m;
        document.getElementById('question').innerText = `${t} x ${m} = ?`;
        document.getElementById('current-q').innerText = currentQ;
        document.getElementById('answer').value = '';
        clearInterval(timerInterval);
        startTimer();
    }

    function saveResult(points) {
        let history = JSON.parse(localStorage.getItem('mathHistory') || '[]');
        let now = new Date();
        history.push({ date: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), score: points });
        localStorage.setItem('mathHistory', JSON.stringify(history));
    }

    function addDigit(n) { document.getElementById('answer').value += n; }
    function clearInput() { document.getElementById('answer').value = ''; }
    function checkAnswer(isTimeout = false) {
        clearInterval(timerInterval);
        let val = parseInt(document.getElementById('answer').value);
        if (!isTimeout && val === currentCorrect) scoreRight++; else scoreWrong++;
        document.getElementById('score-right').innerText = scoreRight;
        document.getElementById('score-wrong').innerText = scoreWrong;
        currentQ++;
        nextQuestion();
    }
</script>
</body>
</html>
